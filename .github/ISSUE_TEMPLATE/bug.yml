name: Bug report
description: Report a problem with ITSWEBER Send
title: 'bug: '
labels: ['bug']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 'e.g. v1.0.0 or commit sha'
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: 'OS, browser, Docker version, deployment topology'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (redact sensitive data)
      render: shell
