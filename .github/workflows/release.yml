name: Release

# Disabled until M6 (first public release).
# At M6 the maintainer will:
#   - remove the `if: false` guards below
#   - tag a release locally (`git tag v1.0.0 && git push --tags`)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish multi-arch image
    runs-on: ubuntu-latest
    if: false   # gated until M6
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Validate release artifact against allowlist
        run: node scripts/prepare-release.mjs --check

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/itsweber/itsweber-send:${{ github.ref_name }}
            ghcr.io/itsweber/itsweber-send:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docker/docker-compose.yml
            docker/Caddyfile.example
            CHANGELOG.md
