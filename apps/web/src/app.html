<!doctype html>
<html lang="de" data-theme="system" %sveltekit.theme%>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Self-hosted, end-to-end encrypted file sharing." />
    <meta name="theme-color" content="#3ba7a7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a1a26" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <title>ITSWEBER Send</title>
    %sveltekit.head%
    <script>
      // Apply persisted theme before paint to avoid a flash.
      try {
        const stored = localStorage.getItem('theme');
        if (stored === 'light' || stored === 'dark' || stored === 'system') {
          document.documentElement.dataset.theme = stored;
        }
      } catch (_) {
        // localStorage may be unavailable; system default applies.
      }
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
