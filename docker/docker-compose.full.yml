# Extended setup: ITSWEBER Send + Caddy + MinIO (S3-compatible object storage).
# Use this when you want S3-compatible blob storage instead of the local filesystem.
#
# Bring it up:   docker compose -f docker/docker-compose.full.yml up -d
# MinIO console: http://localhost:9001  (login with MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
#
# Before the first start, create the bucket named in S3_BUCKET:
#   docker exec -it itsweber-send-minio mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
#   docker exec -it itsweber-send-minio mc mb local/$S3_BUCKET

services:
  send:
    image: ghcr.io/itsweber-official/itsweber-send:latest
    container_name: itsweber-send
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      LOG_LEVEL: info
      RATE_LIMIT_PER_MIN: 60
      ENABLE_ACCOUNTS: 'true'
      STORAGE_BACKEND: s3
      S3_BUCKET: ${S3_BUCKET:-itsweber-send}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: 'true'
      # AWS SDK reads these standard env vars automatically
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    volumes:
      - send-db:/data
    networks:
      - send-net
    expose:
      - '3000'
    depends_on:
      minio:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: itsweber-send-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - send-net
    ports:
      - '9001:9001'
    expose:
      - '9000'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: itsweber-send-caddy
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - send-net
    depends_on:
      - send

networks:
  send-net:
    driver: bridge

volumes:
  send-db:
  minio-data:
  caddy-data:
  caddy-config:
