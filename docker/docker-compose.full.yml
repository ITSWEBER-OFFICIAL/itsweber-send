# Full production setup: ITSWEBER Send + Caddy + Redis (rate-limit) + MinIO (S3 storage).
# Use this when you want a clustered or higher-throughput deployment.

services:
  send:
    image: ghcr.io/itsweber/itsweber-send:latest
    container_name: itsweber-send
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      LOG_LEVEL: info
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: send
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      REDIS_URL: redis://redis:6379
    volumes:
      - send-data:/data
    networks:
      - send-net
    expose:
      - '3000'
    depends_on:
      - redis
      - minio

  caddy:
    image: caddy:2-alpine
    container_name: itsweber-send-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - send-net
    depends_on:
      - send

  redis:
    image: redis:7-alpine
    container_name: itsweber-send-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    volumes:
      - redis-data:/data
    networks:
      - send-net

  minio:
    image: minio/minio:latest
    container_name: itsweber-send-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '9001:9001'
    volumes:
      - minio-data:/data
    networks:
      - send-net

networks:
  send-net:
    driver: bridge

volumes:
  send-data:
  caddy-data:
  caddy-config:
  redis-data:
  minio-data:
