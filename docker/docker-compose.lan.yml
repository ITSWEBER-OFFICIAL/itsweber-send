# LAN test setup: single all-in-one container running both Caddy (HTTPS
# termination on 8443 with self-signed certs) and the Node application
# behind it. Web Crypto needs HTTPS — Caddy's `tls internal` makes the
# self-signed cert path work for LAN IPs without external dependencies.
#
# Bring up:    docker compose -f docker/docker-compose.lan.yml up -d
# Tear down:   docker compose -f docker/docker-compose.lan.yml down
# Open:        https://<host-ip>:8443  (accept the cert warning once)

services:
  send:
    image: itsweber-send:latest
    container_name: itsweber-send
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      HOST: 127.0.0.1
      PORT: 3000
      ORIGIN: ${ORIGIN:-https://localhost:8443}
      BASE_URL: ${ORIGIN:-https://localhost:8443}
      # Caddy embeds the LAN IP into its self-signed cert.
      # Set SEND_HOST to the IP or hostname of your server.
      SEND_HOST: ${SEND_HOST:-192.168.1.100}
      LOG_LEVEL: info
      STORAGE_PATH: /data/uploads
      DB_PATH: /data/shares.db
    volumes:
      - send-data:/data
    ports:
      - '8443:8443'

volumes:
  send-data:
