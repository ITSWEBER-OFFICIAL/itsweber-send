# Production setup: ITSWEBER Send + external Caddy with public Let's Encrypt
# certificate. Use this when the host has direct ports 80/443 free and you
# want Caddy to manage HTTPS termination automatically against a real
# domain (no external reverse proxy plugin like NPM in front).
#
# If you already run NPM, Traefik, or another reverse proxy, use
# docker-compose.proxy.yml instead — it ships only the send container.
#
# Bring it up:   docker compose -f docker/docker-compose.yml up -d
# Logs:          docker compose -f docker/docker-compose.yml logs -f
# Tear down:     docker compose -f docker/docker-compose.yml down
#
# Before first start: copy Caddyfile.example to Caddyfile and replace
# `send.example.com` with your actual hostname. Set ORIGIN to the same
# public URL so generated share links use it.

services:
  send:
    image: ghcr.io/itsweber-official/itsweber-send:latest
    container_name: itsweber-send
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      # Skip the embedded Caddy — the external caddy service below handles
      # public HTTPS. Node binds 0.0.0.0:3000 so the caddy container can
      # reach it on the shared network.
      REVERSE_PROXY_MODE: 'true'
      ORIGIN: ${ORIGIN:-https://send.example.com}
      BASE_URL: ${ORIGIN:-https://send.example.com}
      LOG_LEVEL: info
      RATE_LIMIT_PER_MIN: 60
      ENABLE_ACCOUNTS: 'true'
      STORAGE_BACKEND: filesystem
      STORAGE_PATH: /data/uploads
      # v1.1 resumable upload tuning. Defaults are safe for >5 GB files.
      # CHUNK_SIZE_BYTES: 16777216
      # MAX_BLOB_BYTES: 107374182400          # 100 GB per file
      # UPLOAD_RESUME_HOURS: 24
    volumes:
      - send-data:/data
    networks:
      - send-net
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    container_name: itsweber-send-caddy
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - send-net
    depends_on:
      - send

networks:
  send-net:
    driver: bridge

volumes:
  send-data:
  caddy-data:
  caddy-config:
